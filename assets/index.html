<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scout — Real estate alerts</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    /* warm-neutral palette */
    --bg:        #EFEBE2;   /* room behind the phone */
    --app-bg:    #F4F1E9;   /* app canvas */
    --surface:   #FBFAF5;   /* cards */
    --surface-2: #FFFFFF;
    --ink:       #1C201C;   /* warm near-black */
    --ink-soft:  #5C635B;
    --ink-faint: #8E948B;
    --line:      rgba(28,32,28,0.10);
    --line-soft: rgba(28,32,28,0.06);

    --green:      #2F5D4F;  /* primary */
    --green-deep: #244A3E;
    --green-tint: #E3ECE5;
    --green-tint-2: #D2E0D6;

    --clay:      #C9794A;   /* accent */
    --clay-deep: #B0632F;
    --clay-tint: #F3E2D4;

    --gold:      #C9A24A;
    --radius:    20px;
    --radius-sm: 13px;

    --sans: "Hanken Grotesk", system-ui, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    background-image:
      radial-gradient(circle at 20% 12%, rgba(201,121,74,0.06), transparent 45%),
      radial-gradient(circle at 84% 88%, rgba(47,93,79,0.07), transparent 50%);
    min-height: 100vh;
    font-family: var(--sans);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  #stage {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px 16px;
  }

  /* hide scrollbars inside the app for a native feel */
  .noscroll::-webkit-scrollbar { width: 0; height: 0; }
  .noscroll { scrollbar-width: none; }

  button { font-family: inherit; }
</style>
</head>
<body>
  <div id="stage"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="screens-search.jsx"></script>
  <script type="text/babel" src="screens-manage.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
